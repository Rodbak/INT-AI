name: CI
on:
  pull_request:
    branches: [main]
jobs:
  lint-typecheck-build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'npm'
      - run: npm install
      - run: npx tsc --noEmit
        working-directory: app
      - run: npx tsc --noEmit
        working-directory: server
      - run: npm run lint
        working-directory: app
      - run: npm run lint
        working-directory: server
      - run: npm run build
        working-directory: app
      - run: npm run build
        working-directory: server
